<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<table border="1">
	<tr>
	    <th>ID</th>
	    <th>日付</th>
	    <th>カテゴリ</th>
	</tr>

	<tr th:each="item : ${list}">
	    <td th:text="${item.id}"></td>
	    <td th:text="${item.date}"></td>
	    <td th:text="${item.category}"></td>
	</tr>
	</table>
</body>
</html>
