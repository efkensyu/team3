<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>家計簿カレンダー画面</title>
</head>
<body>
	
	<h1 th:text="${day}"></h1>

	<!--登録した情報がある場合-->
		<p th:each="item : ${list}">
		   <span th:text="${item.name}"></span>
		   <span th:text="${item.price}"></span>
		</p>
	
			
	<!--何も登録していない場合	-->
	<p th:if="${#lists.isEmpty(list)}">
	    なにも登録されていません
	</p>
		
	<form method="get" th:action = "@{Team3displayOut}" >
		<!--Javaファイルに入力情報を渡す-->
		<input type="submit" value="追加">
	</form>	
</body>
</html>
