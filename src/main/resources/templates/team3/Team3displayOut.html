<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<link rel="stylesheet" type="text/css" href="Team3DisplayOut.css">
<meta charset="UTF-8">
<title>家計簿の追加や編集、削除画面</title>
</head>
<body>
<!--ここでは、買った商品、値段を入力させてください。-->
<h1>購入した商品の詳細を入力してください。</h1>
<br>

<h2>合計金額：<span th:text="${total}"></span> 円</h2>
<br>
<form method="post" th:action="@{/Team3add}" th:object="${team3Entity}">


商品名:<input type ="text" th:field="*{name}">
<th:block th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></th:block>
<br>
値段:<input type ="text" th:field="*{price}">円
<th:block th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></th:block>
<br>
個数:<input type="text" th:field="*{quantity}">個
<th:block th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></th:block>
<br>
<!--追加ボタンを作成してください。-->
<input type ="submit" name ="tuika" value = "追加">
<!--追加ボタンを押したら、DBに登録してください。-->

<input type="hidden" name="day" th:value="${day}">
</form>

<!-- データがない場合 -->
<div th:if="${#lists.isEmpty(ary)}">
    まだ登録がありません
</div>

<!-- データがある場合 -->
<div th:each="item, st : ${ary}">
	
        商品名:<span th:text="${item.name}"></span>
		<br>
        値段:<span th:text="${item.price}"></span>円
		<br>
		個数:<span th:text="${item.quantity}"></span>個
		
	<!--編集ボタン-->
		<form method="post" th:action="@{/Team3update}">

		<input type="hidden" name="index" th:value="${st.index}">
		商品名:<input type="text" name="name" th:value="${item.name}">
		<br>
		値段:<input type="text" name="price" th:value="${item.price}">
		<br>
		個数:<input type="text" name="quantity" th:value="${item.quantity}">
		<input type="submit" value="更新">
		</form>
		
	<!--削除ボタン-->
		<form method="post" th:action="@{/Team3delete}">
		<input type="hidden" name="index" th:value="${st.index}">
		<input type="submit" value="削除">
		</form>
</div>

<form method = "post" th:action = "@{/Team3cancel2}">
<!--キャンセルボタンを押したら、Karenderに飛んでください。-->
<input type ="submit" name ="cancel2" value = "キャンセル">
</form>

<form method = "post" th:action = "@{/Team3save}">
<!--保存ボタンを押したら、team3displayInに飛んでください。-->
<input type ="submit" name ="save" value = "保存">
</form>

</body>
</html>
