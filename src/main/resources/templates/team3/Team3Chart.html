<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>円グラフ</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<link rel="stylesheet" type="text/css" href="team3/Team3Chart.css">

<body>
	<!-- 上に固定するバー -->
	<div class="fixed-bar-top">
		</div>

	<!-- 下に固定するバー -->
	<div class="fixed-bar-bottom"></div>

	<div class="content">
		
<h1 th:text="${date} + ' の内訳'"></h1>

<div style="width:500px; margin:auto">
	<canvas id="pieChart"></canvas>
</div>
<script th:inline="javascript">

    let dataMap = /*[[${map}]]*/ {};

    let labels = Object.keys(dataMap);
    let values = Object.values(dataMap);

    new Chart(document.getElementById('pieChart'), {
        type: 'pie',
        data: {
            labels: labels,
            datasets: [{
                data: values
            }]
        }
    });

</script>

<br>

<a class="back" th:href="@{/list(date=${date})}">
<!--DateaddOutにもどる-->
    戻る
</a>
</div>
</body>
</html>
